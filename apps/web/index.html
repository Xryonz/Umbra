<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon assets — gerados pelo RealFaviconGenerator, servidos de /public. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- viewport-fit=cover habilita env(safe-area-inset-*) no WebView/notch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Astra — Mensagens em tempo real, em forma de constelações." />
    <meta name="theme-color" content="#06060e" />
    <title>Astra</title>

    <!-- Resource hints: preconnect estabelece conexão TCP+TLS antes
         do request, economizando ~100-200ms na primeira chamada.
         dns-prefetch é mais leve (só DNS), bom pra hosts secundários. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://livekit.cloud" />
    <link rel="dns-prefetch" href="https://sentry.io" />
    <link rel="dns-prefetch" href="https://o4504609119952896.ingest.sentry.io" />
    <link rel="dns-prefetch" href="https://tenor.googleapis.com" />

    <!-- Preload + media swap: fonts críticas baixam em paralelo ao parsing,
         CSS aplica via display=swap (texto sem flash invisível). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&family=Great+Vibes&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&family=Great+Vibes&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
