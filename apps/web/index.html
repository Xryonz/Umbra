<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon assets — gerados pelo RealFaviconGenerator, servidos de /public. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- viewport-fit=cover habilita env(safe-area-inset-*) no WebView/notch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Astra — Mensagens em tempo real, em forma de constelações." />
    <meta name="theme-color" content="#06060e" />
    <title>Astra</title>

    <!-- Resource hints: dns-prefetch é leve (só DNS), bom pra hosts secundários. -->
    <link rel="dns-prefetch" href="https://livekit.cloud" />
    <link rel="dns-prefetch" href="https://sentry.io" />
    <link rel="dns-prefetch" href="https://o4504609119952896.ingest.sentry.io" />
    <link rel="dns-prefetch" href="https://tenor.googleapis.com" />

    <!-- Fontes self-hosted (/public/fonts, @font-face em src/fonts.css).
         Preload das 2 críticas do primeiro paint: body (DM Sans, arquivo
         variável cobre pesos 300-600) e display (DM Serif). Fonts exigem
         crossorigin no preload mesmo same-origin. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/dm-sans-normal-300-latin.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/dm-serif-display-normal-400-latin.woff2" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
